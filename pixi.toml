[project]
channels = ["conda-forge"]
description = "Transport data science stack"
name = "tds"
platforms = ["win-64", "linux-64", "osx-64"]
version = "0.1.0"

[dependencies]
quarto = "*"
r-base = "*"
r-irkernel = "*"
r-tidyverse = "*"
r-sf = "*"
r-quarto = "*"
r-nycflights13 = "*"
r-remotes = "*"
r-DT = "*"
r-reticulate = "*"
r-spData = "*"
r-pak = "*"
r-geosphere = "*"
python = ">=3.10"
jupyter = "*"
jupyter-cache = "*"
ipykernel = "*"
geopandas = "*"
matplotlib = "*"
shapely = "*"
seaborn = "*"
osmnx = "*"

[tasks]
simple = "echo This is a simple task"
install_r = { cmd="Rscript install.R" }
render = { cmd = "quarto render" }
preview = { cmd = "quarto preview --no-browser" }
install_all = { cmd = "Rscript install.R" }